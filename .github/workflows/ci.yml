name: CI - Terraform Validation

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/**'

env:
  TF_LOG: DEBUG

jobs:
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hello Admin
        run: echo "helloadmin"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.8.0'

      - name: Terraform Format Check
        id: fmt
        run: tofu fmt -check -recursive -diff
        working-directory: terraform

      - name: Terraform Init
        id: init
        run: tofu init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        id: validate
        run: tofu validate
        working-directory: terraform

      - name: Success Message
        run: echo "✅ All Terraform checks passed!"